<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>الرزمانة المزدوجة</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: #0b1220;
  color:white;
  direction: rtl;
}

.container{
  max-width: 900px;
  margin: auto;
  padding: 30px;
}

h1{
  text-align:center;
  margin-bottom:30px;
  color:#38bdf8;
}

.card{
  background:#111827;
  padding:20px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

input{
  width:100%;
  padding:12px;
  font-size:16px;
  border-radius:8px;
  border:none;
  margin-bottom:15px;
}

button{
  width:100%;
  padding:12px;
  background:#38bdf8;
  border:none;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  background:#0ea5e9;
}

/* Timeline */
.timeline{
  position:relative;
  height:120px;
  margin-top:40px;
  border-top:2px solid #334155;
}

/* Solar line */
.solar-line{
  position:absolute;
  top:30px;
  left:0;
  height:4px;
  width:100%;
  background:#22c55e;
}

/* Lunar line */
.lunar-line{
  position:absolute;
  top:80px;
  left:0;
  height:4px;
  width:100%;
  background:#f97316;
}

/* Markers */
.marker{
  position:absolute;
  width:10px;
  height:20px;
  top:20px;
  background:red;
  border-radius:3px;
  transition:0.4s;
}

.marker.lunar{
  top:70px;
  background:orange;
}

/* Freeze badge */
.freeze{
  display:inline-block;
  padding:6px 12px;
  background:#ef4444;
  border-radius:8px;
  margin-top:10px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<h1>🧭 الرزمانة المزدوجة الاحترافية</h1>

<div class="card">

  <input id="yearInput" type="number" min="1" max="50000"
         placeholder="أدخل سنة بين 1 و 50000">

  <button onclick="update()">تشغيل المحرك</button>

  <div id="info" style="margin-top:15px;"></div>

  <div id="freeze" style="margin-top:10px;"></div>

  <div class="timeline">

    <div class="solar-line"></div>
    <div class="lunar-line"></div>

    <div id="solarMarker" class="marker"></div>
    <div id="lunarMarker" class="marker lunar"></div>

  </div>

</div>

</div>

<script>
const MAX = 50000;

function update(){

  let year = parseInt(document.getElementById("yearInput").value);

  if(!year || year < 1){
    document.getElementById("info").innerHTML = "أدخل سنة صحيحة";
    return;
  }

  // شمسي
  let solar = year;

  // قمري مع تجميد
  let lunar = Math.min(year, MAX);

  // نسبة الحركة على الخط (0 → 100%)
  let solarPos = (solar / MAX) * 100;
  let lunarPos = (lunar / MAX) * 100;

  // تحريك المؤشرات
  document.getElementById("solarMarker").style.left = solarPos + "%";
  document.getElementById("lunarMarker").style.left = lunarPos + "%";

  // عرض المعلومات
  document.getElementById("info").innerHTML =
    `📅 شمسي: ${solar} سنة<br>🌙 قمري: ${lunar} سنة`;

  // حالة التجميد
  if(year >= MAX){
    document.getElementById("freeze").innerHTML =
      `<div class="freeze">🧊 تم تجميد التقويم القمري عند 50000 سنة</div>`;
  } else {
    document.getElementById("freeze").innerHTML = "";
  }
}
</script>

</body>
</html>
